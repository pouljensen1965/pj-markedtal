<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Markets Overview</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#e9ebe5;
      --phone:#111113;
      --screen:#f6f7f2;
      --text:#202320;
      --muted:#768072;
      --soft:#eef2ec;
      --green:#69d45d;
      --red:#ff1f26;
      --yellow:#f2cb27;
      --white:#ffffff;
      --shadow:0 18px 55px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      font-family:'Satoshi',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:8px;
    }

    .frame{
      width:min(100%,380px);
      margin:0 auto;
      background:linear-gradient(180deg,#191a1d,#0e0e10);
      border-radius:34px;
      padding:10px;
      box-shadow:var(--shadow);
      border:2px solid #2a2a2d;
    }

    .screen{
      background:var(--screen);
      border-radius:28px;
      height:812px;
      overflow:hidden;
      position:relative;
      border:2px solid #2f3131;
      display:flex;
      flex-direction:column;
    }

    .statusbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 22px 2px;
      font-size:12px;
      font-weight:700;
      flex:none;
    }

    .dynamic-island{
      width:98px;
      height:28px;
      border-radius:18px;
      background:#0b0b0c;
      margin:0 auto 6px;
      flex:none;
    }

    .content{
      padding:10px 14px 18px;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      display:grid;
      gap:12px;
      scrollbar-width:none;
    }

    .content::-webkit-scrollbar{display:none}

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    h1{
      margin:0;
      font-size:18px;
      line-height:1.05;
      font-weight:900;
    }

    .sub{
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }

    .update-btn{
      border:0;
      background:#28b24a;
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      min-width:96px;
      min-height:40px;
      font-size:14px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 8px 20px rgba(40,178,74,.28);
      cursor:pointer;
    }

    .refresh-box{
      background:#edf1ec;
      border:1px solid #dde4db;
      border-radius:10px;
      padding:11px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      color:#40473f;
      font-size:13px;
      transition:.2s ease;
    }

    .refresh-box .spinner{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid #7a8377;
      border-right-color:transparent;
    }

    .cards{
      display:grid;
      gap:10px;
    }

    .card{
      border-radius:12px;
      padding:10px 12px 10px 10px;
      color:#fff;
      position:relative;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
    }

    .card.red{background:linear-gradient(180deg,var(--red),#e0181e)}
    .card.yellow{background:linear-gradient(180deg,var(--yellow),#e1ba19)}
    .card.green{background:linear-gradient(180deg,var(--green),#56c84a)}

    .card-grid{
      display:grid;
      grid-template-columns:50px 1fr 116px;
      gap:10px;
      align-items:center;
    }

    .icon-wrap{
      width:46px;
      height:46px;
      border-radius:50%;
      background:rgba(255,255,255,.94);
      display:grid;
      place-items:center;
      flex:none;
    }

    .icon{
      font-size:22px;
      line-height:1;
    }

    .market{
      font-size:10px;
      font-weight:700;
      opacity:.92;
      text-transform:uppercase;
      letter-spacing:.03em;
    }

    .market small{
      font-size:9px;
      text-transform:none;
      opacity:.9;
    }

    .value{
      font-size:18px;
      line-height:1.05;
      font-weight:900;
      margin-top:2px;
      font-variant-numeric:tabular-nums;
    }

    .change{
      font-size:10px;
      margin-top:5px;
      font-weight:700;
      opacity:.96;
    }

    .period{
      font-size:10px;
      opacity:.9;
      margin-top:2px;
    }

    .trend{
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:8px;
    }

    .badge{
      align-self:end;
      padding:4px 8px;
      border-radius:7px;
      font-size:10px;
      font-weight:900;
      background:rgba(0,0,0,.22);
      color:#fff;
      text-transform:uppercase;
    }

    .sparkline{
      height:42px;
      position:relative;
    }

    .sparkline svg{
      width:100%;
      height:100%;
      display:block;
    }

    .sparkline .base{
      stroke:rgba(255,255,255,.45);
      stroke-dasharray:3 3;
      stroke-width:1.4;
    }

    .sparkline .line{
      fill:none;
      stroke:#fff;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .sparkline .end{
      fill:#fff;
      stroke:rgba(255,255,255,.2);
      stroke-width:2;
    }

    .legend{
      display:flex;
      justify-content:center;
      gap:14px;
      align-items:center;
      font-size:10px;
      color:#454a43;
      background:#fff;
      border-radius:14px;
      padding:8px 10px;
      border:1px solid #e4e8e0;
      margin-bottom:6px;
      flex-wrap:wrap;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .legend-dot{
      width:8px;
      height:8px;
      border-radius:50%;
    }

    .scrollhint{
      text-align:center;
      font-size:11px;
      color:var(--muted);
      padding-bottom:2px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="screen">
      <div class="statusbar"><span>09.41</span><span>▮▮▮ ◔</span></div>
      <div class="dynamic-island"></div>

      <main class="content">
        <section class="hero">
          <div>
            <h1>Markets Overview</h1>
            <div class="sub">Live markedsdata · trykk på et kort for detaljer.</div>
          </div>
          <button class="update-btn" id="refreshBtn"><span>⟳</span><span>Oppdater</span></button>
        </section>

        <div class="refresh-box" id="refreshBox">
          <span class="spinner"></span>
          <span>Oppdaterer data ...</span>
        </div>

        <section class="cards" id="cards"></section>

        <section class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#35b74a"></span>Green = up</div>
          <div class="legend-item"><span class="legend-dot" style="background:#df1317"></span>Red = down</div>
          <div class="legend-item"><span class="legend-dot" style="background:#d7ad00"></span>Yellow = same level</div>
        </section>

        <div class="scrollhint">Bla opp og ned med tommelen for å se alle feltene.</div>
      </main>
    </div>
  </div>

  <script>
    const refreshBtn = document.getElementById('refreshBtn');
    const refreshBox = document.getElementById('refreshBox');
    const cardsEl = document.getElementById('cards');

    const markets = [
      {
        market: 'VIX VOLATILITET',
        value: '17,1',
        changeText: '0 (0%)',
        period: '1 dags endring',
        icon: '🛡️',
        reverse: true,
        changeValue: 0,
        spark: 'M2 22 L10 21 L18 20 L26 19 L34 20 L42 21 L50 20 L58 19 L66 20 L74 21 L82 20 L90 19 L98 20 L106 19'
      },
      {
        market: 'US10Y RENTE',
        value: '4,51%',
        changeText: '0 (0%)',
        period: '1 dags endring',
        icon: '🏛️',
        reverse: true,
        changeValue: 0,
        spark: 'M2 18 L10 18 L18 19 L26 19 L34 20 L42 20 L50 20 L58 21 L66 21 L74 21 L82 22 L90 22 L98 22 L106 22'
      },
      {
        market: 'S&P 500 USA',
        value: '5.297',
        changeText: '+2,1 (+0,40%)',
        period: '1 dags endring',
        icon: '📈',
        reverse: false,
        changeValue: 2.1,
        spark: 'M2 30 L10 28 L18 27 L26 24 L34 22 L42 20 L50 21 L58 18 L66 16 L74 15 L82 14 L90 12 L98 11 L106 10'
      },
      {
        market: 'OLJE WTI',
        value: '97,34',
        changeText: '0 (0%)',
        period: '1 dags endring',
        icon: '🩸',
        reverse: false,
        changeValue: 0,
        spark: 'M2 22 L10 22 L18 22 L26 21 L34 22 L42 22 L50 21 L58 21 L66 21 L74 20 L82 21 L90 21 L98 20 L106 20'
      },
      {
        market: 'GULL SPOT',
        value: '2.341',
        changeText: '+0,10',
        period: '1 dags endring',
        icon: '🪙',
        reverse: false,
        changeValue: 0.10,
        spark: 'M2 24 L10 23 L18 23 L26 22 L34 22 L42 21 L50 21 L58 20 L66 20 L74 19 L82 19 L90 18 L98 18 L106 17'
      },
      {
        market: 'SØLV SPOT',
        value: '27,85',
        changeText: '+0,30 (+1,09%)',
        period: '1 dags endring',
        icon: '🥈',
        reverse: false,
        changeValue: 0.30,
        spark: 'M2 29 L10 27 L18 25 L26 23 L34 22 L42 20 L50 18 L58 17 L66 16 L74 15 L82 13 L90 12 L98 11 L106 10'
      },
      {
        market: 'BITCOIN (USD)',
        value: '66.820',
        changeText: '+1.250 (+1,91%)',
        period: '1 dags endring',
        icon: '₿',
        reverse: false,
        changeValue: 1.25,
        spark: 'M2 28 L10 24 L18 20 L26 22 L34 18 L42 19 L50 16 L58 18 L66 15 L74 13 L82 14 L90 12 L98 13 L106 11'
      },
      {
        market: 'USD / NOK',
        value: '9,2428',
        changeText: '0 (0%)',
        period: '1 dags endring',
        icon: '💵',
        reverse: true,
        changeValue: 0,
        spark: 'M2 20 L10 20 L18 20 L26 21 L34 21 L42 21 L50 21 L58 20 L66 20 L74 20 L82 20 L90 20 L98 20 L106 20'
      }
    ];

    function getState(changeValue, reverse = false) {
      const num = Number(changeValue);

      if (!Number.isFinite(num) || Math.abs(num) < 0.0001) {
        return {
          colorClass: 'yellow',
          badge: 'SAMME NIVÅ'
        };
      }

      if (reverse) {
        return num > 0
          ? { colorClass: 'red', badge: 'NED' }
          : { colorClass: 'green', badge: 'OPP' };
      }

      return num > 0
        ? { colorClass: 'green', badge: 'OPP' }
        : { colorClass: 'red', badge: 'NED' };
    }

    function renderCards() {
      cardsEl.innerHTML = markets.map((item) => {
        const state = getState(item.changeValue, item.reverse);

        return `
          <article class="card ${state.colorClass}">
            <div class="card-grid">
              <div class="icon-wrap"><div class="icon">${item.icon}</div></div>
              <div>
                <div class="market">${item.market}</div>
                <div class="value">${item.value}</div>
                <div class="change">${item.changeText}</div>
                <div class="period">${item.period}</div>
              </div>
              <div class="trend">
                <div class="badge">${state.badge}</div>
                <div class="sparkline">
                  <svg viewBox="0 0 110 42" preserveAspectRatio="none">
                    <path class="base" d="M0 34 H110"></path>
                    <path class="line" d="${item.spark}"></path>
                    <circle class="end" cx="106" cy="20" r="2.8"></circle>
                  </svg>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    refreshBtn.addEventListener('click', () => {
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<span>⟳</span><span>Oppdaterer ...</span>';
      refreshBox.style.opacity = '1';

      setTimeout(() => {
        renderCards();
        refreshBtn.disabled = false;
        refreshBtn.innerHTML = '<span>⟳</span><span>Oppdater</span>';
      }, 1200);
    });

    renderCards();
  </script>
</body>
</html>
