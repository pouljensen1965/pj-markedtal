<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Markedsmåler" />
  <meta name="theme-color" content="#f4f6f1" />
  <title>Markedsmåler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f1;
      --text: #142217;
      --muted: #708070;
      --line: rgba(20,34,23,0.08);
      --shadow: 0 14px 30px rgba(22, 44, 29, 0.10);
      --green: #68cf5d;
      --yellow: #efc61a;
      --red: #ef111b;
      --button: #2ebe4c;
      --button-dark: #1e9837;
      --status-bg: #edf2eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
      max-width: 560px;
      margin: 0 auto;
    }

    .app { padding: 18px 0 28px; }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, rgba(244,246,241,0.97) 0%, rgba(244,246,241,0.92) 75%, rgba(244,246,241,0) 100%);
      backdrop-filter: blur(8px);
      padding-bottom: 10px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 6px 4px 10px;
    }

    .title h1 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .title p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      max-width: 190px;
    }

    .refresh-btn {
      border: none;
      background: linear-gradient(180deg, var(--button) 0%, var(--button-dark) 100%);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 10px 24px rgba(46, 190, 76, 0.28);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      cursor: pointer;
    }

    .refresh-btn:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--status-bg);
      border: 1px solid var(--line);
      color: #435444;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      margin: 6px 0 12px;
      opacity: 0;
      transform: translateY(-4px);
      transition: 180ms ease;
      pointer-events: none;
    }

    .status-box.show {
      opacity: 1;
      transform: translateY(0);
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .card {
      border: none;
      width: 100%;
      text-align: left;
      border-radius: 18px;
      padding: 14px 14px 12px;
      color: #fff;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 12px;
      align-items: center;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.18);
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease;
    }

    .card:active {
      transform: scale(0.985);
      filter: brightness(0.98);
    }

    .card.red {
      background: linear-gradient(180deg, #ff202a 0%, #ef111b 100%);
    }

    .card.yellow {
      background: linear-gradient(180deg, #ffd83f 0%, #efc61a 100%);
    }

    .card.green {
      background: linear-gradient(180deg, #7ce56f 0%, #68cf5d 100%);
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.82);
      color: rgba(20,34,23,0.70);
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 900;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.96;
      margin-bottom: 2px;
    }

    .value {
      font-size: 25px;
      line-height: 1;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .change, .sub {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
    }

    .sub {
      opacity: 0.95;
      margin-top: 2px;
    }

    .right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      min-width: 108px;
    }

    .badge {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      border-radius: 8px;
      padding: 7px 10px;
      background: rgba(0,0,0,0.20);
      white-space: nowrap;
    }

    .spark {
      width: 108px;
      height: 38px;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.88);
      font-size: 11px;
    }

    .legend {
      display: flex;
      justify-content: space-around;
      gap: 10px;
      flex-wrap: wrap;
      color: #425143;
      font-size: 11px;
      padding: 10px 10px 0;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.green { background: #2cad37; }
    .dot.red { background: #e11a24; }
    .dot.yellow { background: #dfb300; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="top">
        <div class="title">
          <h1>Markets Overview</h1>
          <p>Live markedsdata · trykk på et kort for detaljer.</p>
        </div>
        <button class="refresh-btn" id="refreshBtn" type="button">
          <span>⟳</span>
          <span>Oppdater</span>
        </button>
      </div>

      <div class="status-box" id="statusBox">
        <span>◔</span>
        <span id="statusText">Updating data ...</span>
      </div>
    </header>

    <section class="cards" id="cards"></section>

    <div class="legend">
      <span><i class="dot green"></i> Green = up</span>
      <span><i class="dot red"></i> Red = down</span>
      <span><i class="dot yellow"></i> Yellow = same level</span>
    </div>
  </main>

  <script>
    const BASE_URL = "https://pj-markedstal.poulj.workers.dev";

    const marketConfig = [
      { key: "vix", label: "VIX", sublabel: "Volatilitet", icon: "🛡️" },
      { key: "us10y", label: "US10Y", sublabel: "Rente", icon: "🏛️" },
      { key: "sp500", label: "S&P 500", sublabel: "USA", icon: "📈" },
      { key: "oil", label: "Olje", sublabel: "WTI", icon: "🩸" },
      { key: "gold", label: "Gull", sublabel: "Spot", icon: "🪙" },
      { key: "silver", label: "Sølv", sublabel: "Spot", icon: "🥈" },
      { key: "bitcoin", label: "Bitcoin", sublabel: "USD", icon: "₿" },
      { key: "usdNok", label: "USD / NOK", sublabel: "", icon: "💵" }
    ];

    const fallbackData = {
      vix: { value: "16,7", change: "-0,8 (-4,57%)", trend: "red" },
      us10y: { value: "4,49%", change: "-0,03 (-0,66%)", trend: "yellow" },
      sp500: { value: "5.297", change: "+2,1 (+0,40%)", trend: "green" },
      oil: { value: "78,42", change: "-0,42 (-0,53%)", trend: "red" },
      gold: { value: "2.341", change: "+0,10", trend: "yellow" },
      silver: { value: "27,85", change: "+0,30 (+1,09%)", trend: "green" },
      bitcoin: { value: "66.820", change: "+1.250 (+1,91%)", trend: "green" },
      usdNok: { value: "10,75", change: "0,00 (0,00%)", trend: "yellow" }
    };

    const cardsEl = document.getElementById("cards");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusBox = document.getElementById("statusBox");
    const statusText = document.getElementById("statusText");

    function badgeText(trend) {
      if (trend === "green") return "OPP";
      if (trend === "red") return "NED";
      return "SAMME NIVÅ";
    }

    function detectTrend(value) {
      const n = Number(String(value).replace(",", ".").replace("%", ""));
      if (Number.isNaN(n)) return "yellow";
      if (n > 0) return "green";
      if (n < 0) return "red";
      return "yellow";
    }

    function fmtNumber(value, decimals = 2) {
      const n = Number(value);
      if (Number.isNaN(n)) return String(value ?? "-");
      return n.toLocaleString("no-NO", {
        minimumFractionDigits: 0,
        maximumFractionDigits: decimals
      });
    }

    function fmtSigned(value, decimals = 2, suffix = "") {
      const n = Number(value);
      if (Number.isNaN(n)) return String(value ?? "-");
      const sign = n > 0 ? "+" : "";
      return sign + n.toLocaleString("no-NO", {
        minimumFractionDigits: 0,
        maximumFractionDigits: decimals
      }) + suffix;
    }

    function pick(obj, keys) {
      for (const key of keys) {
        if (obj && obj[key] !== undefined && obj[key] !== null) return obj[key];
      }
      return null;
    }

    function renderCards(data) {
      cardsEl.innerHTML = "";

      marketConfig.forEach((item) => {
        const row = data[item.key] || fallbackData[item.key];
        const card = document.createElement("button");
        card.type = "button";
        card.className = `card market-card ${row.trend}`;
        card.dataset.market = item.label;

        card.innerHTML = `
          <div class="icon">${item.icon}</div>
          <div class="content">
            <div class="eyebrow">${item.label}${item.sublabel ? " " + item.sublabel : ""}</div>
            <div class="value">${row.value}</div>
            <div class="change">${row.change}</div>
            <div class="sub">1 dags endring</div>
          </div>
          <div class="right">
            <div class="badge">${badgeText(row.trend)}</div>
            <div class="spark">live</div>
          </div>
        `;

        card.addEventListener("click", () => {
          alert(item.label + " åpnes her. Neste steg er detaljvisning.");
        });

        cardsEl.appendChild(card);
      });
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    }

    async function loadLiveData() {
      statusText.textContent = "Updating data ...";
      statusBox.classList.add("show");
      refreshBtn.disabled = true;

      try {
        const [vixRes, us10yRes, oilRes, fxRes] = await Promise.all([
          fetchJson(BASE_URL + "/yahoo?symbol=^VIX"),
          fetchJson(BASE_URL + "/yahoo?symbol=^TNX"),
          fetchJson(BASE_URL + "/yahoo?symbol=BZ=F"),
          fetchJson(BASE_URL + "/fx")
        ]);

        const liveData = { ...fallbackData };

        const vixPrice = pick(vixRes, ["price", "regularMarketPrice", "value", "close"]);
        const vixChange = pick(vixRes, ["change", "regularMarketChange", "delta"]);
        const vixPct = pick(vixRes, ["changePercent", "regularMarketChangePercent", "pct"]);
        if (vixPrice !== null) {
          liveData.vix = {
            value: fmtNumber(vixPrice, 2),
            change: `${fmtSigned(vixChange, 2)} (${fmtSigned(vixPct, 2, "%")})`,
            trend: detectTrend(vixChange)
          };
        }

        const us10yPrice = pick(us10yRes, ["price", "regularMarketPrice", "value", "close"]);
        const us10yChange = pick(us10yRes, ["change", "regularMarketChange", "delta"]);
        const us10yPct = pick(us10yRes, ["changePercent", "regularMarketChangePercent", "pct"]);
        if (us10yPrice !== null) {
          liveData.us10y = {
            value: fmtNumber(us10yPrice, 2) + "%",
            change: `${fmtSigned(us10yChange, 2)} (${fmtSigned(us10yPct, 2, "%")})`,
            trend: detectTrend(us10yChange)
          };
        }

        const oilPrice = pick(oilRes, ["price", "regularMarketPrice", "value", "close"]);
        const oilChange = pick(oilRes, ["change", "regularMarketChange", "delta"]);
        const oilPct = pick(oilRes, ["changePercent", "regularMarketChangePercent", "pct"]);
        if (oilPrice !== null) {
          liveData.oil = {
            value: fmtNumber(oilPrice, 2),
            change: `${fmtSigned(oilChange, 2)} (${fmtSigned(oilPct, 2, "%")})`,
            trend: detectTrend(oilChange)
          };
        }

        const usdNokPrice = pick(fxRes, ["usdNok", "rate", "price", "value"]);
        const usdNokChange = pick(fxRes, ["change", "delta", "diff"]);
        const usdNokPct = pick(fxRes, ["changePercent", "pct", "percent"]);
        if (usdNokPrice !== null) {
          liveData.usdNok = {
            value: fmtNumber(usdNokPrice, 4),
            change: usdNokChange !== null
              ? `${fmtSigned(usdNokChange, 4)}${usdNokPct !== null ? ` (${fmtSigned(usdNokPct, 2, "%")})` : ""}`
              : "Live",
            trend: detectTrend(usdNokChange ?? 0)
          };
        }

        renderCards(liveData);
        statusText.textContent = "Data oppdatert";
      } catch (error) {
        renderCards(fallbackData);
        statusText.textContent = "Kunne ikke hente live-data";
      }

      setTimeout(() => {
        statusBox.classList.remove("show");
        refreshBtn.disabled = false;
      }, 2000);
    }

    refreshBtn.addEventListener("click", loadLiveData);
    renderCards(fallbackData);
    loadLiveData();
  </script>
</body>
</html>
