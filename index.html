<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Markedstal" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>PJ Markedstal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #eef4fb, #f8fafc);
      color: #0f172a;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }
    .wrap { max-width: 420px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 4px 14px;
    }
    h1 { font-size: 22px; font-weight: 700; }
    .sub { font-size: 12px; color: #64748b; margin-top: 2px; }
    .btn {
      background: #0f172a;
      color: #fff;
      border: none;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
    }
    .status {
      background: #fff7ed;
      color: #9a3412;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      margin: 6px 4px 14px;
      border: 1px solid #fed7aa;
    }
    .status.ok { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
    .status.err { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 14px 16px 16px;
      margin: 0 4px 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .card .label { font-size: 13px; font-weight: 700; color: #0f172a; }
    .card .val {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin: 4px 0 10px;
    }
    .bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(90deg, #16a34a 0% 34%, #eab308 34% 68%, #dc2626 68% 100%);
    }
    .knob {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #0f172a;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .scale {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #64748b;
      margin-top: 6px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #64748b;
      margin-top: 8px;
    }
    .meta .live { color: #16a34a; font-weight: 600; }
    .meta .fb   { color: #b45309; font-weight: 600; }
    .updated { text-align: center; font-size: 12px; color: #64748b; margin: 10px 0 24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Markedsmaler</h1>
        <div class="sub">Live markedsdata · PJ</div>
      </div>
      <button class="btn" id="refreshBtn">Opdater</button>
    </header>

    <div class="status" id="status">Henter nye tal…</div>

    <div id="kort"></div>

    <div class="updated" id="opdatert"></div>
  </div>

  <script>
    const WORKER_URL = "https://pj-markedstal.poulj.workers.dev";

    const Serier = [
      { Nokkel: "us10y",  Navn: "US 10Y rente",      Enhet: "%", Fallback: 4.57, lavt: 3.5, hojt: 4.5,  path: "/fred?series=DGS10" },
      { Nokkel: "vix",    Navn: "VIX / frygtindeks", Enhet: "",  Fallback: 16.8, lavt: 15,  hojt: 25,   path: "/fred?series=VIXCLS" },
      { Nokkel: "brent",  Navn: "Brent olie",        Enhet: "$", Fallback: 104,  lavt: 70,  hojt: 95,   path: "/fred?series=DCOILBRENTEU" },
      { Nokkel: "usdnok", Navn: "USD / NOK",         Enhet: "",  Fallback: 9.27, lavt: 8.5, hojt: 10.5, path: "/fx" }
    ];

    const fmt = n => Number(n).toFixed(2);
    const posPct = (n, a, b) => Math.max(0, Math.min(100, ((n - a) / (b - a)) * 100));

    function render(data) {
      const el = document.getElementById("kort");
      el.innerHTML = "";
      data.forEach(s => {
        const p = posPct(s.Verdi, s.lavt * 0.8, s.hojt * 1.2);
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML =
          '<div class="label">' + s.Navn + '</div>' +
          '<div class="val">' + fmt(s.Verdi) + s.Enhet + '</div>' +
          '<div class="bar"><div class="knob" style="left:' + p + '%"></div></div>' +
          '<div class="scale"><span>Lav</span><span>Normal</span><span>Hoj</span></div>' +
          '<div class="meta"><span>Senest: ' + (s.Dato || "—") + '</span>' +
          '<span class="' + (s.Kilde === "Live" ? "live" : "fb") + '">' + s.Kilde + '</span></div>';
        el.appendChild(card);
      });
    }

    async function fetchSeries(path) {
      const r = await fetch(WORKER_URL + path, { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return await r.json();
    }

    async function loadAll() {
      const status = document.getElementById("status");
      status.className = "status";
      status.textContent = "Henter nye tal…";

      const cache = JSON.parse(localStorage.getItem("pj_markedstal") || "{}");
      const result = [];
      let okCount = 0;

      for (const s of Serier) {
        try {
          const j = await fetchSeries(s.path);
          if (j && j.value !== null && j.value !== undefined && !isNaN(j.value)) {
            result.push({ ...s, Verdi: j.value, Dato: j.date, Kilde: "Live" });
            okCount++;
          } else {
            const c = cache[s.Nokkel];
            result.push({ ...s, Verdi: c?.Verdi ?? s.Fallback, Dato: c?.Dato || "fallback", Kilde: "Reserve" });
          }
        } catch (e) {
          const c = cache[s.Nokkel];
          result.push({ ...s, Verdi: c?.Verdi ?? s.Fallback, Dato: c?.Dato || "fallback", Kilde: "Reserve" });
        }
      }

      const now = new Date().toLocaleString("da-DK", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit", year: "numeric" });
      const saved = { Oppdatert: now };
      result.forEach(r => saved[r.Nokkel] = { Verdi: r.Verdi, Dato: r.Dato, Kilde: r.Kilde });
      localStorage.setItem("pj_markedstal", JSON.stringify(saved));

      render(result);
      document.getElementById("opdatert").textContent = "Sidst opdateret: " + now;

      if (okCount === Serier.length) {
        status.className = "status ok";
        status.textContent = "Alle tal er live opdateret.";
      } else if (okCount > 0) {
        status.className = "status";
        status.textContent = "Nogle tal blev hentet live, andre bruger reservetal.";
      } else {
        status.className = "status err";
        status.textContent = "Kunne ikke hente live tal. Bruger reservetal.";
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadAll);
    document.addEventListener("visibilitychange", () => { if (!document.hidden) loadAll(); });

    loadAll();
    setInterval(loadAll, 5 * 60 * 1000);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
