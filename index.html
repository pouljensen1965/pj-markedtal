<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Markets Overview</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#efefe9;
      --text:#202320;
      --muted:#6f786c;
      --green:#69d45d;
      --red:#ff1f26;
      --yellow:#f2cb27;
      --shadow:0 10px 30px rgba(0,0,0,.08);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:'Satoshi',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .app{
      width:100%;
      max-width:100%;
      min-height:100vh;
      padding:20px 16px 40px;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-top:8px;
    }

    h1{
      margin:0;
      font-size:28px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .sub{
      font-size:16px;
      color:var(--muted);
      margin-top:8px;
      line-height:1.35;
      max-width:220px;
    }

    .update-btn{
      border:0;
      background:#28b24a;
      color:#fff;
      border-radius:14px;
      padding:14px 18px;
      min-width:120px;
      min-height:52px;
      font-size:16px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 10px 25px rgba(40,178,74,.24);
      cursor:pointer;
      flex:none;
    }

    .update-btn:disabled{
      opacity:.75;
      cursor:default;
    }

    .cards{
      display:grid;
      gap:14px;
      margin-top:22px;
    }

    .card{
      border-radius:22px;
      padding:16px 16px 14px 14px;
      color:#fff;
      position:relative;
      overflow:hidden;
      box-shadow:0 12px 28px rgba(0,0,0,.12);
    }

    .card.red{background:linear-gradient(180deg,var(--red),#e0181e)}
    .card.yellow{background:linear-gradient(180deg,var(--yellow),#e1ba19)}
    .card.green{background:linear-gradient(180deg,var(--green),#56c84a)}

    .card-grid{
      display:grid;
      grid-template-columns:64px 1fr 132px;
      gap:12px;
      align-items:center;
    }

    .icon-wrap{
      width:58px;
      height:58px;
      border-radius:50%;
      background:rgba(255,255,255,.94);
      display:grid;
      place-items:center;
      flex:none;
    }

    .icon{
      font-size:28px;
      line-height:1;
      color:#5f685c;
      font-weight:900;
    }

    .market{
      font-size:13px;
      font-weight:800;
      opacity:.95;
      text-transform:uppercase;
      letter-spacing:.03em;
    }

    .value{
      font-size:28px;
      line-height:1.02;
      font-weight:900;
      margin-top:4px;
      font-variant-numeric:tabular-nums;
      letter-spacing:-0.03em;
    }

    .meta-stack{
      margin-top:8px;
      display:grid;
      gap:2px;
    }

    .meta-line{
      font-size:12px;
      line-height:1.18;
      font-weight:700;
      opacity:.96;
      font-variant-numeric:tabular-nums;
    }

    .meta-line .label{
      opacity:.88;
      margin-right:6px;
    }

    .trend{
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:10px;
    }

    .badge{
      align-self:end;
      padding:7px 12px;
      border-radius:11px;
      font-size:13px;
      font-weight:900;
      background:rgba(0,0,0,.18);
      color:#fff;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .sparkline{
      height:52px;
      position:relative;
    }

    .sparkline svg{
      width:100%;
      height:100%;
      display:block;
    }

    .sparkline .base{
      stroke:rgba(255,255,255,.45);
      stroke-dasharray:5 5;
      stroke-width:1.8;
    }

    .sparkline .line{
      fill:none;
      stroke:#fff;
      stroke-width:3;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .sparkline .end{
      fill:#fff;
      stroke:rgba(255,255,255,.2);
      stroke-width:3;
    }

    .legend{
      display:flex;
      justify-content:center;
      gap:16px;
      align-items:center;
      font-size:13px;
      color:#454a43;
      background:#fff;
      border-radius:18px;
      padding:12px 14px;
      border:1px solid #e4e8e0;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .legend-dot{
      width:10px;
      height:10px;
      border-radius:50%;
    }

    .scrollhint{
      text-align:center;
      font-size:14px;
      color:var(--muted);
      padding:18px 0 6px;
    }

    @media (max-width:390px){
      .card-grid{
        grid-template-columns:58px 1fr 118px;
        gap:10px;
      }

      h1{font-size:24px}
      .sub{font-size:15px;max-width:200px}
      .value{font-size:24px}
      .badge{font-size:12px;padding:6px 10px}
      .meta-line{font-size:11px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>Markets Overview</h1>
        <div class="sub">Live markedsdata · trykk på et kort for detaljer.</div>
      </div>
      <button class="update-btn" id="refreshBtn"><span>⟳</span><span>Oppdater</span></button>
    </section>

    <section class="cards" id="cards"></section>

    <section class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#35b74a"></span>Green = up</div>
      <div class="legend-item"><span class="legend-dot" style="background:#df1317"></span>Red = down</div>
      <div class="legend-item"><span class="legend-dot" style="background:#d7ad00"></span>Yellow = same level</div>
    </section>

    <div class="scrollhint">Bla opp og ned med tommelen for å se alle feltene.</div>
  </main>

  <script>
    const WORKER_BASE = 'https://pj-markedstal.poulj.workers.dev';

    const refreshBtn = document.getElementById('refreshBtn');
    const cardsEl = document.getElementById('cards');

    const marketConfig = [
      {
        key: 'vix',
        market: 'VIX VOLATILITET',
        icon: '🛡️',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5EVIX`,
        reverse: true,
        type: 'number',
        decimals: 1,
        spark: 'M2 30 L10 27 L18 26 L26 24 L34 22 L42 24 L50 21 L58 18 L66 20 L74 17 L82 18 L90 16 L98 17 L106 15'
      },
      {
        key: 'us10y',
        market: 'US10Y RENTE',
        icon: '🏛️',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5ETNX`,
        reverse: true,
        type: 'tnx_percent',
        decimals: 2,
        spark: 'M2 14 L10 15 L18 16 L26 16 L34 17 L42 18 L50 19 L58 20 L66 21 L74 22 L82 23 L90 24 L98 25 L106 26'
      },
      {
        key: 'sp500',
        market: 'S&P 500 USA',
        icon: '📈',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5EGSPC`,
        reverse: false,
        type: 'number',
        decimals: 0,
        spark: 'M2 28 L10 26 L18 25 L26 23 L34 21 L42 20 L50 18 L58 16 L66 17 L74 14 L82 13 L90 11 L98 12 L106 10'
      },
      {
        key: 'oil',
        market: 'OLJE WTI',
        icon: '🩸',
        endpoint: `${WORKER_BASE}/yahoo?symbol=CL%3DF`,
        reverse: false,
        type: 'number',
        decimals: 2,
        spark: 'M2 26 L10 24 L18 22 L26 21 L34 19 L42 20 L50 18 L58 17 L66 18 L74 16 L82 17 L90 15 L98 16 L106 14'
      },
      {
        key: 'gold',
        market: 'GULL SPOT',
        icon: '🪙',
        endpoint: `${WORKER_BASE}/yahoo?symbol=GC%3DF`,
        reverse: false,
        type: 'number',
        decimals: 0,
        spark: 'M2 24 L10 24 L18 23 L26 22 L34 22 L42 21 L50 20 L58 20 L66 19 L74 19 L82 18 L90 18 L98 17 L106 17'
      },
      {
        key: 'silver',
        market: 'SØLV SPOT',
        icon: '🥈',
        endpoint: `${WORKER_BASE}/yahoo?symbol=SI%3DF`,
        reverse: false,
        type: 'number',
        decimals: 2,
        spark: 'M2 29 L10 27 L18 26 L26 24 L34 22 L42 21 L50 19 L58 18 L66 17 L74 15 L82 14 L90 13 L98 12 L106 10'
      },
      {
        key: 'bitcoin',
        market: 'BITCOIN (USD)',
        icon: '₿',
        endpoint: `${WORKER_BASE}/yahoo?symbol=BTC-USD`,
        reverse: false,
        type: 'number',
        decimals: 0,
        spark: 'M2 30 L10 26 L18 22 L26 24 L34 20 L42 18 L50 16 L58 18 L66 14 L74 12 L82 13 L90 11 L98 12 L106 9'
      },
      {
        key: 'usdnok',
        market: 'USD / NOK',
        icon: '💵',
        endpoint: `${WORKER_BASE}/yahoo?symbol=USDNOK%3DX`,
        reverse: true,
        type: 'number',
        decimals: 4,
        spark: 'M2 18 L10 19 L18 19 L26 20 L34 20 L42 21 L50 21 L58 22 L66 22 L74 23 L82 23 L90 24 L98 24 L106 25'
      }
    ];

    function formatNumberNo(value, decimals = 0) {
      return Number(value).toLocaleString('no-NO', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function parseWorkerValue(data) {
      const candidates = [
        data?.value,
        data?.price,
        data?.regularMarketPrice,
        data?.currentPrice,
        data?.close,
        data?.quoteResponse?.result?.[0]?.regularMarketPrice
      ];
      for (const candidate of candidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) return num;
      }
      return null;
    }

    function parseWorkerPreviousClose(data) {
      const candidates = [
        data?.previousClose,
        data?.chartPreviousClose,
        data?.meta?.previousClose,
        data?.quoteResponse?.result?.[0]?.regularMarketPreviousClose
      ];
      for (const candidate of candidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) return num;
      }
      return null;
    }

    function parseWorkerChange(data) {
      const valueCandidates = [
        data?.change,
        data?.regularMarketChange,
        data?.priceChange,
        data?.quoteResponse?.result?.[0]?.regularMarketChange
      ];
      const pctCandidates = [
        data?.changePercent,
        data?.regularMarketChangePercent,
        data?.percentChange,
        data?.quoteResponse?.result?.[0]?.regularMarketChangePercent
      ];

      let change = null;
      let changePct = null;

      for (const candidate of valueCandidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) { change = num; break; }
      }
      for (const candidate of pctCandidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) { changePct = num; break; }
      }

      return { change, changePct };
    }

    function getState(signalValue, reverse = false) {
      const num = Number(signalValue);
      if (!Number.isFinite(num) || Math.abs(num) < 0.0001) {
        return { colorClass: 'yellow', badge: 'SAMME NIVÅ' };
      }
      if (reverse) {
        return num > 0
          ? { colorClass: 'red', badge: 'NED' }
          : { colorClass: 'green', badge: 'OPP' };
      }
      return num > 0
        ? { colorClass: 'green', badge: 'OPP' }
        : { colorClass: 'red', badge: 'NED' };
    }

    function buildDisplayValue(rawValue, config) {
      if (!Number.isFinite(rawValue)) return '—';
      if (config.type === 'tnx_percent') {
        const value = rawValue > 20 ? rawValue / 10 : rawValue;
        return `${formatNumberNo(value, config.decimals)}%`;
      }
      return formatNumberNo(rawValue, config.decimals);
    }

    function normalizeRawValue(rawValue, config) {
      if (!Number.isFinite(rawValue)) return null;
      if (config.type === 'tnx_percent') {
        return rawValue > 20 ? rawValue / 10 : rawValue;
      }
      return rawValue;
    }

    function normalizeChange(rawChange, rawChangePct, config) {
      let change = rawChange;
      let changePct = rawChangePct;

      if (config.type === 'tnx_percent' && Number.isFinite(rawChange)) {
        change = Math.abs(rawChange) > 2 ? rawChange / 10 : rawChange;
      }

      return { change, changePct };
    }

    function buildChangeText(change, changePct, decimals = 2) {
      const hasChange = Number.isFinite(change);
      const hasPct = Number.isFinite(changePct);

      if (!hasChange && !hasPct) return '—';

      const sign = hasChange && change > 0 ? '+' : '';
      const valueText = hasChange ? `${sign}${formatNumberNo(change, decimals)}` : '';

      const pctSign = hasPct && changePct > 0 ? '+' : '';
      const pctText = hasPct ? ` (${pctSign}${formatNumberNo(changePct, 2)}%)` : '';

      return `${valueText}${pctText}`.trim();
    }

    async function fetchMarket(config) {
      const response = await fetch(config.endpoint, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();

      const rawValue = parseWorkerValue(data);
      const rawPreviousClose = parseWorkerPreviousClose(data);
      const { change: rawChange, changePct: rawChangePct } = parseWorkerChange(data);

      const normalizedValue = normalizeRawValue(rawValue, config);
      const normalizedPrevious = normalizeRawValue(rawPreviousClose, config);

      let change = rawChange;
      let changePct = rawChangePct;

      if (!Number.isFinite(change) && Number.isFinite(normalizedValue) && Number.isFinite(normalizedPrevious)) {
        change = normalizedValue - normalizedPrevious;
      }

      if (!Number.isFinite(changePct) && Number.isFinite(change) && Number.isFinite(normalizedPrevious) && normalizedPrevious !== 0) {
        changePct = (change / normalizedPrevious) * 100;
      }

      const normalized = normalizeChange(change, changePct, config);

      return {
        ...config,
        valueText: buildDisplayValue(rawValue, config),
        previousText: buildDisplayValue(rawPreviousClose, config),
        changeText: buildChangeText(
          normalized.change,
          normalized.changePct,
          config.decimals === 4 ? 4 : 2
        ),
        signalValue: normalized.changePct ?? normalized.change ?? 0
      };
    }

    function renderCards(items) {
      cardsEl.innerHTML = items.map((item) => {
        const state = getState(item.signalValue, item.reverse);

        return `
          <article class="card ${state.colorClass}">
            <div class="card-grid">
              <div class="icon-wrap"><div class="icon">${item.icon}</div></div>
              <div>
                <div class="market">${item.market}</div>
                <div class="value">${item.valueText}</div>
                <div class="meta-stack">
                  <div class="meta-line"><span class="label">I går</span>${item.previousText}</div>
                  <div class="meta-line"><span class="label">1 dags endring</span>${item.changeText}</div>
                </div>
              </div>
              <div class="trend">
                <div class="badge">${state.badge}</div>
                <div class="sparkline">
                  <svg viewBox="0 0 110 42" preserveAspectRatio="none">
                    <path class="base" d="M0 34 H110"></path>
                    <path class="line" d="${item.spark}"></path>
                    <circle class="end" cx="106" cy="20" r="2.8"></circle>
                  </svg>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    async function loadMarkets() {
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<span>⟳</span><span>Oppdaterer ...</span>';
      try {
        const results = await Promise.all(marketConfig.map(fetchMarket));
        renderCards(results);
      } catch (error) {
        console.error(error);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.innerHTML = '<span>⟳</span><span>Oppdater</span>';
      }
    }

    refreshBtn.addEventListener('click', loadMarkets);
    loadMarkets();
  </script>
</body>
</html>
