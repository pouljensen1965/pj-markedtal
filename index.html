<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Markets Overview</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#efefe9;
      --text:#202320;
      --muted:#6f786c;
      --green:#69d45d;
      --red:#ff1f26;
      --yellow:#f2cb27;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:'Satoshi',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .app{
      width:100%;
      max-width:100%;
      min-height:100vh;
      padding:20px 16px 40px;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-top:8px;
    }

    h1{
      margin:0;
      font-size:28px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .sub{
      font-size:16px;
      color:var(--muted);
      margin-top:8px;
      line-height:1.35;
      max-width:220px;
    }

    .update-btn{
      border:0;
      background:#28b24a;
      color:#fff;
      border-radius:14px;
      padding:14px 18px;
      min-width:120px;
      min-height:52px;
      font-size:16px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 10px 25px rgba(40,178,74,.24);
      cursor:pointer;
      flex:none;
    }

    .update-btn:disabled{
      opacity:.75;
      cursor:default;
    }

    .cards{
      display:grid;
      gap:14px;
      margin-top:22px;
    }

    .card{
      border-radius:22px;
      padding:16px 16px 14px 14px;
      color:#fff;
      position:relative;
      overflow:hidden;
      box-shadow:0 12px 28px rgba(0,0,0,.12);
    }

    .card.red{background:linear-gradient(180deg,var(--red),#e0181e)}
    .card.yellow{background:linear-gradient(180deg,var(--yellow),#e1ba19)}
    .card.green{background:linear-gradient(180deg,var(--green),#56c84a)}

    .card-grid{
      display:grid;
      grid-template-columns:64px 1fr 116px;
      gap:12px;
      align-items:center;
    }

    .icon-wrap{
      width:58px;
      height:58px;
      border-radius:50%;
      background:rgba(255,255,255,.94);
      display:grid;
      place-items:center;
      flex:none;
    }

    .icon{
      font-size:28px;
      line-height:1;
      color:#5f685c;
      font-weight:900;
    }

    .market{
      font-size:13px;
      font-weight:800;
      opacity:.95;
      text-transform:uppercase;
      letter-spacing:.03em;
    }

    .value{
      font-size:28px;
      line-height:1.02;
      font-weight:900;
      margin-top:4px;
      font-variant-numeric:tabular-nums;
      letter-spacing:-0.03em;
    }

    .meta-stack{
      margin-top:8px;
      display:grid;
      gap:2px;
    }

    .meta-line{
      font-size:12px;
      line-height:1.18;
      font-weight:700;
      opacity:.96;
      font-variant-numeric:tabular-nums;
    }

    .meta-line .label{
      opacity:.88;
      margin-right:6px;
    }

    .trend{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:52px;
    }

    .status-mark{
      width:100%;
      max-width:96px;
      position:relative;
      height:28px;
    }

    .status-mark::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:50%;
      transform:translateY(-50%);
      border-top:2px dashed rgba(255,255,255,.52);
    }

    .status-mark::after{
      content:"";
      position:absolute;
      right:0;
      top:50%;
      width:8px;
      height:8px;
      border-radius:50%;
      transform:translateY(-50%);
      background:#fff;
      box-shadow:0 0 0 3px rgba(255,255,255,.16);
    }

    .legend{
      display:flex;
      justify-content:center;
      gap:16px;
      align-items:center;
      font-size:13px;
      color:#454a43;
      background:#fff;
      border-radius:18px;
      padding:12px 14px;
      border:1px solid #e4e8e0;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .legend-dot{
      width:10px;
      height:10px;
      border-radius:50%;
    }

    .scrollhint{
      text-align:center;
      font-size:14px;
      color:var(--muted);
      padding:18px 0 6px;
    }

    @media (max-width:390px){
      .card-grid{
        grid-template-columns:58px 1fr 96px;
        gap:10px;
      }

      h1{font-size:24px}
      .sub{font-size:15px;max-width:200px}
      .value{font-size:24px}
      .meta-line{font-size:11px}
      .status-mark{max-width:82px}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>Markets Overview</h1>
        <div class="sub">Live markedsdata · trykk på et kort for detaljer.</div>
      </div>
      <button class="update-btn" id="refreshBtn"><span>⟳</span><span>Oppdater</span></button>
    </section>

    <section class="cards" id="cards"></section>

    <section class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#35b74a"></span>Green = positiv utvikling</div>
      <div class="legend-item"><span class="legend-dot" style="background:#df1317"></span>Red = negativ utvikling</div>
      <div class="legend-item"><span class="legend-dot" style="background:#d7ad00"></span>Yellow = samme nivå</div>
    </section>

    <div class="scrollhint">Bla opp og ned med tommelen for å se alle feltene.</div>
  </main>

  <script>
    const WORKER_BASE = 'https://pj-markedstal.poulj.workers.dev';

    const refreshBtn = document.getElementById('refreshBtn');
    const cardsEl = document.getElementById('cards');

    const marketConfig = [
      {
        key: 'vix',
        market: 'VIX VOLATILITET',
        icon: '🛡️',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5EVIX`,
        reverse: true,
        type: 'number',
        decimals: 1
      },
      {
        key: 'us10y',
        market: 'US10Y RENTE',
        icon: '🏛️',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5ETNX`,
        reverse: true,
        type: 'tnx_percent',
        decimals: 2
      },
      {
        key: 'sp500',
        market: 'S&P 500 USA',
        icon: '📈',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5EGSPC`,
        reverse: false,
        type: 'number',
        decimals: 0
      },
      {
        key: 'oil',
        market: 'OLJE WTI',
        icon: '🩸',
        endpoint: `${WORKER_BASE}/yahoo?symbol=CL%3DF`,
        reverse: false,
        type: 'number',
        decimals: 2
      },
      {
        key: 'gold',
        market: 'GULL SPOT',
        icon: '🪙',
        endpoint: `${WORKER_BASE}/yahoo?symbol=GC%3DF`,
        reverse: false,
        type: 'number',
        decimals: 0
      },
      {
        key: 'silver',
        market: 'SØLV SPOT',
        icon: '🥈',
        endpoint: `${WORKER_BASE}/yahoo?symbol=SI%3DF`,
        reverse: false,
        type: 'number',
        decimals: 2
      },
      {
        key: 'bitcoin',
        market: 'BITCOIN (USD)',
        icon: '₿',
        endpoint: `${WORKER_BASE}/yahoo?symbol=BTC-USD`,
        reverse: false,
        type: 'number',
        decimals: 0
      },
      {
        key: 'usdnok',
        market: 'USD / NOK',
        icon: '💵',
        endpoint: `${WORKER_BASE}/yahoo?symbol=USDNOK%3DX`,
        reverse: true,
        type: 'number',
        decimals: 4
      }
    ];

    function formatNumberNo(value, decimals = 0) {
      return Number(value).toLocaleString('no-NO', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function parseWorkerValue(data) {
      const candidates = [
        data?.value,
        data?.price,
        data?.regularMarketPrice,
        data?.currentPrice,
        data?.close,
        data?.quoteResponse?.result?.[0]?.regularMarketPrice
      ];
      for (const candidate of candidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) return num;
      }
      return null;
    }

    function parseWorkerPreviousClose(data) {
      const candidates = [
        data?.previousClose,
        data?.chartPreviousClose,
        data?.meta?.previousClose,
        data?.quoteResponse?.result?.[0]?.regularMarketPreviousClose
      ];
      for (const candidate of candidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) return num;
      }
      return null;
    }

    function parseWorkerChange(data) {
      const valueCandidates = [
        data?.change,
        data?.regularMarketChange,
        data?.priceChange,
        data?.quoteResponse?.result?.[0]?.regularMarketChange
      ];
      const pctCandidates = [
        data?.changePercent,
        data?.regularMarketChangePercent,
        data?.percentChange,
        data?.quoteResponse?.result?.[0]?.regularMarketChangePercent
      ];

      let change = null;
      let changePct = null;

      for (const candidate of valueCandidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) { change = num; break; }
      }
      for (const candidate of pctCandidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) { changePct = num; break; }
      }

      return { change, changePct };
    }

    function getState(signalValue, reverse = false) {
      const num = Number(signalValue);

      if (!Number.isFinite(num) || Math.abs(num) < 0.0001) {
        return { colorClass: 'yellow' };
      }

      if (reverse) {
        return num > 0 ? { colorClass: 'red' } : { colorClass: 'green' };
      }

      return num > 0 ? { colorClass: 'green' } : { colorClass: 'red' };
    }

    function buildDisplayValue(rawValue, config) {
      if (!Number.isFinite(rawValue)) return '—';
      if (config.type === 'tnx_percent') {
        const value = rawValue > 20 ? rawValue / 10 : rawValue;
        return `${formatNumberNo(value, config.decimals)}%`;
      }
      return formatNumberNo(rawValue, config.decimals);
    }

    function normalizeRawValue(rawValue, config) {
      if (!Number.isFinite(rawValue)) return null;
      if (config.type === 'tnx_percent') {
        return rawValue > 20 ? rawValue / 10 : rawValue;
      }
      return rawValue;
    }

    function normalizeChange(rawChange, rawChangePct, config) {
      let change = rawChange;
      let changePct = rawChangePct;

      if (config.type === 'tnx_percent' && Number.isFinite(rawChange)) {
        change = Math.abs(rawChange) > 2 ? rawChange / 10 : rawChange;
      }

      return { change, changePct };
    }

    function buildChangeText(change, decimals = 2) {
      const hasChange = Number.isFinite(change);
      if (!hasChange) return '—';

      const sign = change > 0 ? '+' : '';
      return `${sign}${formatNumberNo(change, decimals)}`;
    }

    async function fetchMarket(config) {
      const response = await fetch(config.endpoint, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();

      const rawValue = parseWorkerValue(data);
      const rawPreviousClose = parseWorkerPreviousClose(data);
      const { change: rawChange, changePct: rawChangePct } = parseWorkerChange(data);

      const normalizedValue = normalizeRawValue(rawValue, config);
      const normalizedPrevious = normalizeRawValue(rawPreviousClose, config);

      let change = rawChange;
      let changePct = rawChangePct;

      if (!Number.isFinite(change) && Number.isFinite(normalizedValue) && Number.isFinite(normalizedPrevious)) {
        change = normalizedValue - normalizedPrevious;
      }

      if (!Number.isFinite(changePct) && Number.isFinite(change) && Number.isFinite(normalizedPrevious) && normalizedPrevious !== 0) {
        changePct = (change / normalizedPrevious) * 100;
      }

      const normalized = normalizeChange(change, changePct, config);

      return {
        ...config,
        valueText: buildDisplayValue(rawValue, config),
        previousText: buildDisplayValue(rawPreviousClose, config),
        changeText: buildChangeText(
          normalized.change,
          config.decimals === 4 ? 4 : 2
        ),
        signalValue: normalized.changePct ?? normalized.change ?? 0
      };
    }

    function renderCards(items) {
      cardsEl.innerHTML = items.map((item) => {
        const state = getState(item.signalValue, item.reverse);

        return `
          <article class="card ${state.colorClass}">
            <div class="card-grid">
              <div class="icon-wrap"><div class="icon">${item.icon}</div></div>
              <div>
                <div class="market">${item.market}</div>
                <div class="value">${item.valueText}</div>
                <div class="meta-stack">
                  <div class="meta-line"><span class="label">I går</span>${item.previousText}</div>
                  <div class="meta-line"><span class="label">1 dags endring</span>${item.changeText}</div>
                </div>
              </div>
              <div class="trend">
                <div class="status-mark" aria-hidden="true"></div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    async function loadMarkets() {
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<span>⟳</span><span>Oppdaterer ...</span>';
      try {
        const results = await Promise.all(marketConfig.map(fetchMarket));
        renderCards(results);
      } catch (error) {
        console.error(error);
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.innerHTML = '<span>⟳</span><span>Oppdater</span>';
      }
    }

    refreshBtn.addEventListener('click', loadMarkets);
    loadMarkets();
  </script>
</body>
</html>
