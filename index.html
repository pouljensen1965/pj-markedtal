<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Markets Overview</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ebeae3;
      --phone:#111113;
      --screen:#f6f7f2;
      --text:#202320;
      --muted:#768072;
      --soft:#eef2ec;
      --green:#69d45d;
      --red:#ff1f26;
      --yellow:#f2cb27;
      --white:#ffffff;
      --shadow:0 18px 55px rgba(0,0,0,.18);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      font-family:'Satoshi',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:8px;
    }

    .frame{
      width:min(100%,380px);
      margin:0 auto;
      background:linear-gradient(180deg,#191a1d,#0e0e10);
      border-radius:34px;
      padding:10px;
      box-shadow:var(--shadow);
      border:2px solid #2a2a2d;
    }

    .screen{
      background:var(--screen);
      border-radius:28px;
      height:812px;
      overflow:hidden;
      position:relative;
      border:2px solid #2f3131;
      display:flex;
      flex-direction:column;
    }

    .statusbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 22px 2px;
      font-size:12px;
      font-weight:700;
      flex:none;
    }

    .dynamic-island{
      width:98px;
      height:28px;
      border-radius:18px;
      background:#0b0b0c;
      margin:0 auto 6px;
      flex:none;
    }

    .content{
      padding:10px 14px 18px;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      display:grid;
      gap:12px;
      scrollbar-width:none;
    }

    .content::-webkit-scrollbar{display:none}

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    h1{
      margin:0;
      font-size:18px;
      line-height:1.05;
      font-weight:900;
    }

    .sub{
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }

    .update-btn{
      border:0;
      background:#28b24a;
      color:#fff;
      border-radius:10px;
      padding:10px 14px;
      min-width:96px;
      min-height:40px;
      font-size:14px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 8px 20px rgba(40,178,74,.28);
      cursor:pointer;
    }

    .update-btn:disabled{
      opacity:.7;
      cursor:default;
    }

    .refresh-box{
      background:#edf1ec;
      border:1px solid #dde4db;
      border-radius:10px;
      padding:11px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      color:#40473f;
      font-size:13px;
      transition:.2s ease;
    }

    .refresh-box .spinner{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid #7a8377;
      border-right-color:transparent;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .morgen{
      background:#fff;
      border:1px solid #e3e8df;
      border-radius:12px;
      padding:12px 14px;
      box-shadow:0 8px 20px rgba(0,0,0,.05);
    }

    .morgen .label{
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:4px;
    }

    .morgen .line{
      font-size:14px;
      font-weight:700;
      line-height:1.3;
    }

    .cards{
      display:grid;
      gap:10px;
    }

    .card{
      border-radius:12px;
      padding:10px 12px 10px 10px;
      color:#fff;
      position:relative;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
    }

    .card.red{background:linear-gradient(180deg,var(--red),#e0181e)}
    .card.yellow{background:linear-gradient(180deg,var(--yellow),#e1ba19)}
    .card.green{background:linear-gradient(180deg,var(--green),#56c84a)}

    .card-grid{
      display:grid;
      grid-template-columns:50px 1fr 116px;
      gap:10px;
      align-items:center;
    }

    .icon-wrap{
      width:46px;
      height:46px;
      border-radius:50%;
      background:rgba(255,255,255,.94);
      display:grid;
      place-items:center;
      flex:none;
    }

    .icon{
      font-size:22px;
      line-height:1;
    }

    .market{
      font-size:10px;
      font-weight:700;
      opacity:.92;
      text-transform:uppercase;
      letter-spacing:.03em;
    }

    .market small{
      font-size:9px;
      text-transform:none;
      opacity:.9;
    }

    .value{
      font-size:18px;
      line-height:1.05;
      font-weight:900;
      margin-top:2px;
      font-variant-numeric:tabular-nums;
    }

    .change{
      font-size:10px;
      margin-top:5px;
      font-weight:700;
      opacity:.96;
    }

    .period{
      font-size:10px;
      opacity:.9;
      margin-top:2px;
    }

    .trend{
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:8px;
    }

    .badge{
      align-self:end;
      padding:4px 8px;
      border-radius:7px;
      font-size:10px;
      font-weight:900;
      background:rgba(0,0,0,.22);
      color:#fff;
      text-transform:uppercase;
    }

    .sparkline{
      height:42px;
      position:relative;
    }

    .sparkline svg{
      width:100%;
      height:100%;
      display:block;
    }

    .sparkline .base{
      stroke:rgba(255,255,255,.45);
      stroke-dasharray:3 3;
      stroke-width:1.4;
    }

    .sparkline .line{
      fill:none;
      stroke:#fff;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .sparkline .end{
      fill:#fff;
      stroke:rgba(255,255,255,.2);
      stroke-width:2;
    }

    .legend{
      display:flex;
      justify-content:center;
      gap:14px;
      align-items:center;
      font-size:10px;
      color:#454a43;
      background:#fff;
      border-radius:14px;
      padding:8px 10px;
      border:1px solid #e4e8e0;
      margin-bottom:6px;
      flex-wrap:wrap;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .legend-dot{
      width:8px;
      height:8px;
      border-radius:50%;
    }

    .scrollhint{
      text-align:center;
      font-size:11px;
      color:var(--muted);
      padding-bottom:2px;
    }

    @media (max-width:380px){
      .card-grid{grid-template-columns:46px 1fr 108px}
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="screen">
      <div class="statusbar"><span>09.41</span><span>▮▮▮ ◔</span></div>
      <div class="dynamic-island"></div>

      <main class="content">
        <section class="hero">
          <div>
            <h1>Markets Overview</h1>
            <div class="sub">Live markedsdata · trykk på et kort for detaljer.</div>
          </div>
          <button class="update-btn" id="refreshBtn"><span>⟳</span><span>Oppdater</span></button>
        </section>

        <div class="refresh-box" id="refreshBox">
          <span class="spinner"></span>
          <span id="refreshText">Oppdaterer data ...</span>
        </div>

        <section class="morgen">
          <div class="label">Morgenstatus</div>
          <div class="line" id="morgenLine">Laster markedsbilde ...</div>
        </section>

        <section class="cards" id="cards"></section>

        <section class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:#35b74a"></span>Green = up</div>
          <div class="legend-item"><span class="legend-dot" style="background:#df1317"></span>Red = down</div>
          <div class="legend-item"><span class="legend-dot" style="background:#d7ad00"></span>Yellow = same level</div>
        </section>

        <div class="scrollhint">Bla opp og ned med tommelen for å se alle feltene.</div>
      </main>
    </div>
  </div>

  <script>
    const WORKER_BASE = 'https://pj-markedstal.poulj.workers.dev';

    const refreshBtn = document.getElementById('refreshBtn');
    const refreshBox = document.getElementById('refreshBox');
    const refreshText = document.getElementById('refreshText');
    const cardsEl = document.getElementById('cards');
    const morgenLine = document.getElementById('morgenLine');

    const marketConfig = [
      {
        key: 'vix',
        market: 'VIX VOLATILITET',
        icon: '🛡️',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5EVIX`,
        reverse: true,
        type: 'number',
        decimals: 1,
        spark: 'M2 30 L10 27 L18 26 L26 24 L34 22 L42 24 L50 21 L58 18 L66 20 L74 17 L82 18 L90 16 L98 17 L106 15'
      },
      {
        key: 'us10y',
        market: 'US10Y RENTE',
        icon: '🏛️',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5ETNX`,
        reverse: true,
        type: 'percent_from_tnx',
        decimals: 2,
        spark: 'M2 14 L10 15 L18 16 L26 16 L34 17 L42 18 L50 19 L58 20 L66 21 L74 22 L82 23 L90 24 L98 25 L106 26'
      },
      {
        key: 'sp500',
        market: 'S&P 500 USA',
        icon: '📈',
        endpoint: `${WORKER_BASE}/yahoo?symbol=%5EGSPC`,
        reverse: false,
        type: 'number',
        decimals: 0,
        spark: 'M2 28 L10 26 L18 25 L26 23 L34 21 L42 20 L50 18 L58 16 L66 17 L74 14 L82 13 L90 11 L98 12 L106 10'
      },
      {
        key: 'oil',
        market: 'OLJE WTI',
        icon: '🩸',
        endpoint: `${WORKER_BASE}/yahoo?symbol=CL%3DF`,
        reverse: false,
        type: 'number',
        decimals: 2,
        spark: 'M2 26 L10 24 L18 22 L26 21 L34 19 L42 20 L50 18 L58 17 L66 18 L74 16 L82 17 L90 15 L98 16 L106 14'
      },
      {
        key: 'gold',
        market: 'GULL SPOT',
        icon: '🪙',
        endpoint: `${WORKER_BASE}/yahoo?symbol=GC%3DF`,
        reverse: false,
        type: 'number',
        decimals: 0,
        spark: 'M2 24 L10 24 L18 23 L26 22 L34 22 L42 21 L50 20 L58 20 L66 19 L74 19 L82 18 L90 18 L98 17 L106 17'
      },
      {
        key: 'silver',
        market: 'SØLV SPOT',
        icon: '🥈',
        endpoint: `${WORKER_BASE}/yahoo?symbol=SI%3DF`,
        reverse: false,
        type: 'number',
        decimals: 2,
        spark: 'M2 29 L10 27 L18 26 L26 24 L34 22 L42 21 L50 19 L58 18 L66 17 L74 15 L82 14 L90 13 L98 12 L106 10'
      },
      {
        key: 'bitcoin',
        market: 'BITCOIN (USD)',
        icon: '₿',
        endpoint: `${WORKER_BASE}/yahoo?symbol=BTC-USD`,
        reverse: false,
        type: 'number',
        decimals: 0,
        spark: 'M2 30 L10 26 L18 22 L26 24 L34 20 L42 18 L50 16 L58 18 L66 14 L74 12 L82 13 L90 11 L98 12 L106 9'
      },
      {
        key: 'usdnok',
        market: 'USD / NOK',
        icon: '💵',
        endpoint: `${WORKER_BASE}/yahoo?symbol=NOK%3DX`,
        reverse: true,
        type: 'inverse_fx',
        decimals: 4,
        spark: 'M2 18 L10 19 L18 19 L26 20 L34 20 L42 21 L50 21 L58 22 L66 22 L74 23 L82 23 L90 24 L98 24 L106 25'
      }
    ];

    function formatNumberNo(value, decimals = 0) {
      return Number(value).toLocaleString('no-NO', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function parseWorkerNumber(data) {
      const candidates = [
        data?.price,
        data?.regularMarketPrice,
        data?.currentPrice,
        data?.value,
        data?.close,
        data?.quoteResponse?.result?.[0]?.regularMarketPrice
      ];

      for (const candidate of candidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) return num;
      }

      return null;
    }

    function parseWorkerChange(data) {
      const valueCandidates = [
        data?.change,
        data?.regularMarketChange,
        data?.priceChange,
        data?.quoteResponse?.result?.[0]?.regularMarketChange
      ];

      const pctCandidates = [
        data?.changePercent,
        data?.regularMarketChangePercent,
        data?.percentChange,
        data?.quoteResponse?.result?.[0]?.regularMarketChangePercent
      ];

      let change = null;
      let changePct = null;

      for (const candidate of valueCandidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) {
          change = num;
          break;
        }
      }

      for (const candidate of pctCandidates) {
        const num = Number(candidate);
        if (Number.isFinite(num)) {
          changePct = num;
          break;
        }
      }

      return { change, changePct };
    }

    function getState(changeValue, reverse = false) {
      const num = Number(changeValue);

      if (!Number.isFinite(num) || Math.abs(num) < 0.0001) {
        return { colorClass: 'yellow', badge: 'SAMME NIVÅ' };
      }

      if (reverse) {
        return num > 0
          ? { colorClass: 'red', badge: 'NED' }
          : { colorClass: 'green', badge: 'OPP' };
      }

      return num > 0
        ? { colorClass: 'green', badge: 'OPP' }
        : { colorClass: 'red', badge: 'NED' };
    }

    function buildChangeText(change, changePct, decimals = 2) {
      const hasChange = Number.isFinite(change);
      const hasPct = Number.isFinite(changePct);

      if (!hasChange && !hasPct) return 'Live';

      const sign = hasChange && change > 0 ? '+' : '';
      const changeText = hasChange
        ? `${sign}${formatNumberNo(change, decimals)}`
        : '';

      const pctSign = hasPct && changePct > 0 ? '+' : '';
      const pctText = hasPct
        ? ` (${pctSign}${formatNumberNo(changePct, 2)}%)`
        : '';

      return `${changeText}${pctText}`.trim();
    }

    function buildValue(rawValue, config) {
      if (!Number.isFinite(rawValue)) return '—';

      if (config.type === 'percent_from_tnx') {
        return `${formatNumberNo(rawValue / 10, config.decimals)}%`;
      }

      if (config.type === 'inverse_fx') {
        return formatNumberNo(1 / rawValue, config.decimals);
      }

      return formatNumberNo(rawValue, config.decimals);
    }

    function buildNormalizedChanges(rawValue, rawChange, rawChangePct, config) {
      let value = rawValue;
      let change = rawChange;
      let changePct = rawChangePct;

      if (config.type === 'percent_from_tnx') {
        value = Number.isFinite(rawValue) ? rawValue / 10 : rawValue;
        change = Number.isFinite(rawChange) ? rawChange / 10 : rawChange;
      }

      if (config.type === 'inverse_fx') {
        if (Number.isFinite(rawValue) && rawValue !== 0) {
          const inverseValue = 1 / rawValue;
          const previous = Number.isFinite(rawChange) ? (rawValue - rawChange) : null;
          value = inverseValue;

          if (Number.isFinite(previous) && previous !== 0) {
            const inversePrev = 1 / previous;
            change = inverseValue - inversePrev;
            changePct = ((inverseValue / inversePrev) - 1) * 100;
          }
        }
      }

      return { value, change, changePct };
    }

    async function fetchMarket(config) {
      const response = await fetch(config.endpoint, { cache: 'no-store' });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      const rawValue = parseWorkerNumber(data);
      const { change: rawChange, changePct: rawChangePct } = parseWorkerChange(data);
      const normalized = buildNormalizedChanges(rawValue, rawChange, rawChangePct, config);

      return {
        ...config,
        valueText: buildValue(rawValue, config),
        changeText: buildChangeText(normalized.change, normalized.changePct, config.type === 'inverse_fx' ? 4 : (config.decimals > 2 ? config.decimals : 2)),
        period: '1 dags endring',
        signalValue: normalized.changePct ?? normalized.change ?? 0
      };
    }

    function renderCards(items) {
      cardsEl.innerHTML = items.map((item) => {
        const state = getState(item.signalValue, item.reverse);

        return `
          <article class="card ${state.colorClass}">
            <div class="card-grid">
              <div class="icon-wrap"><div class="icon">${item.icon}</div></div>
              <div>
                <div class="market">${item.market}</div>
                <div class="value">${item.valueText}</div>
                <div class="change">${item.changeText}</div>
                <div class="period">${item.period}</div>
              </div>
              <div class="trend">
                <div class="badge">${state.badge}</div>
                <div class="sparkline">
                  <svg viewBox="0 0 110 42" preserveAspectRatio="none">
                    <path class="base" d="M0 34 H110"></path>
                    <path class="line" d="${item.spark}"></path>
                    <circle class="end" cx="106" cy="20" r="2.8"></circle>
                  </svg>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function buildMorningText(items) {
      const lookup = Object.fromEntries(items.map(item => [item.key, item]));
      const parts = [];

      if (lookup.vix) {
        const vixState = getState(lookup.vix.signalValue, true).badge.toLowerCase();
        parts.push(`frykt ${vixState}`);
      }

      if (lookup.us10y) {
        const rateState = getState(lookup.us10y.signalValue, true).badge.toLowerCase();
        parts.push(`rente ${rateState}`);
      }

      if (lookup.sp500) {
        const spState = getState(lookup.sp500.signalValue, false).badge.toLowerCase();
        parts.push(`aksjer ${spState}`);
      }

      return parts.length ? parts.join(', ') + '.' : 'Markedene oppdatert.';
    }

    async function loadMarkets() {
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<span>⟳</span><span>Oppdaterer ...</span>';
      refreshText.textContent = 'Oppdaterer data ...';

      try {
        const results = await Promise.all(marketConfig.map(fetchMarket));
        renderCards(results);
        morgenLine.textContent = buildMorningText(results);
        refreshText.textContent = 'Data oppdatert';
      } catch (error) {
        console.error(error);
        refreshText.textContent = 'Kunne ikke hente live-data';
        morgenLine.textContent = 'Live-data er midlertidig utilgjengelig.';
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.innerHTML = '<span>⟳</span><span>Oppdater</span>';
      }
    }

    refreshBtn.addEventListener('click', loadMarkets);

    loadMarkets();
  </script>
</body>
</html>
