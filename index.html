<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Markedstal" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>PJ Markedstal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b1220;
      color: #e6edf7;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }
    header {
      padding: 20px 0 16px;
      text-align: center;
      border-bottom: 1px solid #1f2a3d;
    }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.3px; }
    .subtitle { font-size: 13px; color: #8a96ad; margin-top: 4px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px 0;
    }
    .card {
      background: #131c2e;
      border: 1px solid #1f2a3d;
      border-radius: 14px;
      padding: 14px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card .label {
      font-size: 12px;
      color: #8a96ad;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card .value {
      font-size: 26px;
      font-weight: 700;
      margin: 6px 0;
    }
    .card .meta {
      font-size: 11px;
      color: #6b7689;
    }
    .actions {
      display: flex;
      gap: 10px;
      padding: 8px 0 20px;
    }
    button {
      flex: 1;
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
    }
    button:active { background: #1d4ed8; }
    .status {
      text-align: center;
      font-size: 12px;
      color: #6b7689;
      padding: 6px 0 20px;
    }
    .loading { opacity: 0.5; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>PJ Markedstal</h1>
    <div class="subtitle">Live markedsdata</div>
  </header>

  <div class="grid">
    <div class="card" id="card-us10y">
      <div class="label">US 10Y rente</div>
      <div class="value" id="us10y-value">—</div>
      <div class="meta" id="us10y-date">henter…</div>
    </div>

    <div class="card" id="card-vix">
      <div class="label">VIX (frygt)</div>
      <div class="value" id="vix-value">—</div>
      <div class="meta" id="vix-date">henter…</div>
    </div>

    <div class="card" id="card-brent">
      <div class="label">Brent olie (USD)</div>
      <div class="value" id="brent-value">—</div>
      <div class="meta" id="brent-date">henter…</div>
    </div>

    <div class="card" id="card-fx">
      <div class="label">USD / NOK</div>
      <div class="value" id="fx-value">—</div>
      <div class="meta" id="fx-date">henter…</div>
    </div>
  </div>

  <div class="actions">
    <button onclick="loadAll()">Opdater nu</button>
  </div>

  <div class="status" id="status">Klar.</div>

  <script>
    const WORKER_URL = "https://pj-markedstal.poulj.workers.dev";

    const FALLBACK = {
      us10y: { value: 4.55, date: "fallback" },
      vix:   { value: 17.0, date: "fallback" },
      brent: { value: 100.0, date: "fallback" },
      fx:    { value: 9.27, date: "fallback" }
    };

    function getLastKnown(id) {
      try {
        const raw = localStorage.getItem("pj_last_" + id);
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return null;
    }
    function saveLastKnown(id, value, date) {
      try {
        localStorage.setItem("pj_last_" + id, JSON.stringify({ value, date }));
      } catch(e) {}
    }

    function setCard(id, value, date, suffix = "") {
      const v = document.getElementById(id + "-value");
      const d = document.getElementById(id + "-date");
      if (value === null || value === undefined || isNaN(value)) {
        v.textContent = "—";
        d.textContent = "ingen data";
        d.classList.add("err");
        return;
      }
      v.textContent = (typeof value === "number" ? value.toFixed(2) : value) + suffix;
      d.textContent = date || "";
      d.classList.remove("err");
    }

    async function fetchSeries(path) {
      const r = await fetch(WORKER_URL + path, { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return await r.json();
    }

    async function loadAll() {
      const status = document.getElementById("status");
      status.textContent = "Henter data…";
      status.classList.remove("err");

      ["us10y", "vix", "brent", "fx"].forEach(id => {
        document.getElementById("card-" + id).classList.add("loading");
      });

      const tasks = [
        { id: "us10y", path: "/yahoo?symbol=^TNX",  suffix: "%", fb: FALLBACK.us10y },
        { id: "vix",   path: "/yahoo?symbol=^VIX",  suffix: "",  fb: FALLBACK.vix   },
        { id: "brent", path: "/yahoo?symbol=BZ=F",  suffix: "",  fb: FALLBACK.brent },
        { id: "fx",    path: "/fx",                 suffix: "",  fb: FALLBACK.fx    }
      ];

      let okCount = 0;
      let failCount = 0;

      await Promise.all(tasks.map(async t => {
        try {
          const j = await fetchSeries(t.path);
          if (j && j.value !== null && j.value !== undefined && !isNaN(j.value)) {
            setCard(t.id, j.value, j.date, t.suffix);
            saveLastKnown(t.id, j.value, j.date);
            okCount++;
          } else {
            const last = getLastKnown(t.id);
            if (last) {
              setCard(t.id, last.value, "sidst kendt " + last.date, t.suffix);
            } else {
              setCard(t.id, t.fb.value, "fallback", t.suffix);
            }
            failCount++;
          }
        } catch (e) {
          const last = getLastKnown(t.id);
          if (last) {
            setCard(t.id, last.value, "sidst kendt " + last.date, t.suffix);
          } else {
            setCard(t.id, t.fb.value, "fallback", t.suffix);
          }
          failCount++;
        } finally {
          document.getElementById("card-" + t.id).classList.remove("loading");
        }
      }));

      const now = new Date().toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
      if (okCount === 4) {
        status.textContent = "Opdateret " + now;
      } else if (okCount > 0) {
        status.textContent = "Delvis opdateret " + now + " (" + failCount + " fallback)";
      } else {
        status.textContent = "Bruger fallback-tal (Worker ikke nået)";
        status.classList.add("err");
      }
    }

    loadAll();
    setInterval(loadAll, 5 * 60 * 1000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) loadAll();
    });
  </script>
</body>
</html>
